<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clock Overlay</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(13, 13, 15, 0.95);
      font-family: system-ui, -apple-system, sans-serif;
      user-select: none;
      cursor: grab;
      overflow: hidden;
    }

    body:active {
      cursor: grabbing;
    }

    .container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-app-region: drag;
      position: relative;
      background: rgba(13, 13, 15, 0.95);
    }

    .title-bar {
      -webkit-app-region: drag;
      width: 100%;
      padding: 8px 12px;
      background: rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid rgba(0, 255, 136, 0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #888;
    }

    .title {
      -webkit-app-region: drag;
      flex: 1;
    }

    .controls {
      display: flex;
      gap: 6px;
      -webkit-app-region: no-drag;
    }

    .control-btn {
      -webkit-app-region: no-drag;
      background: rgba(0, 150, 200, 0.7);
      color: white;
      border: none;
      width: 28px;
      height: 24px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      padding: 0;
    }

    .control-btn:hover {
      background: rgba(0, 150, 200, 1);
    }

    .control-btn.active {
      background: rgba(0, 255, 136, 0.7);
    }

    .control-btn.active:hover {
      background: rgba(0, 255, 136, 1);
    }

    .close-btn {
      -webkit-app-region: no-drag;
      background: rgba(255, 100, 100, 0.7);
      color: white;
      border: none;
      width: 24px;
      height: 24px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .close-btn:hover {
      background: rgba(255, 100, 100, 1);
    }

    body.transparent {
      background: transparent;
    }

    body.transparent .container {
      background: transparent;
    }

    body.transparent .title-bar {
      opacity: 0;
      transition: opacity 0.2s;
      background: rgba(0, 0, 0, 0.2);
      border-bottom-color: transparent;
      pointer-events: none;
    }

    body.transparent:hover .title-bar {
      opacity: 1;
      pointer-events: auto;
    }

    body.transparent .image-container {
      background: transparent;
      width: 100%;
      height: 100%;
      padding: 0;
    }

    .resize-handle {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 20px;
      height: 20px;
      cursor: nwse-resize;
      background: linear-gradient(135deg, transparent 0%, transparent 50%, rgba(0, 255, 136, 0.3) 50%, rgba(0, 255, 136, 0.3) 100%);
      -webkit-app-region: no-drag;
    }

    .resize-handle:hover {
      background: linear-gradient(135deg, transparent 0%, transparent 50%, rgba(0, 255, 136, 0.6) 50%, rgba(0, 255, 136, 0.6) 100%);
    }

    body.transparent .resize-handle {
      background: linear-gradient(135deg, transparent 0%, transparent 50%, rgba(0, 255, 136, 0.5) 50%, rgba(0, 255, 136, 0.5) 100%);
    }

    body.transparent .resize-handle:hover {
      background: linear-gradient(135deg, transparent 0%, transparent 50%, rgba(0, 255, 136, 0.8) 50%, rgba(0, 255, 136, 0.8) 100%);
    }

    .image-container {
      flex: 1;
      width: calc(100% - 16px);
      height: calc(100% - 56px);
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: no-drag;
      background: rgba(13, 13, 15, 0.95);
    }

    img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 8px 32px rgba(0, 255, 136, 0.15);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title-bar">
      <div class="title" id="mapName">Clock Overlay</div>
      <div class="controls">
        <button class="control-btn" id="transparentBtn" title="Toggle transparent background">👁️</button>
        <button class="close-btn" id="closeBtn">✕</button>
      </div>
    </div>
    <div class="image-container">
      <img id="overlayImage" src="" alt="Clock">
    </div>
    <div class="resize-handle" id="resizeHandle"></div>
  </div>

  <script>
    // Get query parameters
    const urlParams = new URLSearchParams(window.location.search);
    const imagePath = decodeURIComponent(urlParams.get('image'));
    const mapName = decodeURIComponent(urlParams.get('name'));

    console.log('Opening pop-out for:', mapName);
    console.log('Image path:', imagePath);

    // Set up the UI
    document.getElementById('mapName').textContent = mapName;
    document.getElementById('overlayImage').src = imagePath;

    // Close button
    document.getElementById('closeBtn').addEventListener('click', () => {
      window.close();
    });

    // Transparency toggle
    const transparentBtn = document.getElementById('transparentBtn');
    const isTransparent = localStorage.getItem('overlayTransparent') === 'true';
    
    if (isTransparent) {
      document.body.classList.add('transparent');
      transparentBtn.classList.add('active');
    }

    transparentBtn.addEventListener('click', () => {
      document.body.classList.toggle('transparent');
      transparentBtn.classList.toggle('active');
      const newState = document.body.classList.contains('transparent');
      localStorage.setItem('overlayTransparent', newState);
    });

    // Resize handle
    const resizeHandle = document.getElementById('resizeHandle');
    let isResizing = false;
    let startX = 0;
    let startY = 0;
    let startWidth = 0;
    let startHeight = 0;

    resizeHandle.addEventListener('mousedown', (e) => {
      isResizing = true;
      startX = e.clientX;
      startY = e.clientY;
      startWidth = window.innerWidth;
      startHeight = window.innerHeight;
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (isResizing) {
        const deltaX = e.clientX - startX;
        const deltaY = e.clientY - startY;
        const newWidth = Math.max(300, startWidth + deltaX);
        const newHeight = Math.max(300, startHeight + deltaY);
        
        if (window.api && window.api.resizeWindow) {
          window.api.resizeWindow(newWidth, newHeight);
        }
      }
    });

    document.addEventListener('mouseup', () => {
      isResizing = false;
    });

    // Allow dragging from title bar
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;

    document.querySelector('.title-bar').addEventListener('mousedown', (e) => {
      if (e.target.id !== 'closeBtn') {
        isDragging = true;
        dragStartX = e.clientX;
        dragStartY = e.clientY;
      }
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
    });
  </script>
</body>
</html>
