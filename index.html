<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VD Clock Map Overlay</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <h1>Violence District</h1>
      
      <div class="category-tabs">
        <button class="category-tab active" data-category="maps">🗺️ Maps</button>
        <button class="category-tab" data-category="1v1">⚔️ 1V1</button>
        <button class="category-tab" data-category="settings">⚙️ Settings</button>
      </div>

      <div class="category-section active" id="maps-section">
        <h2>Clock Maps</h2>
        <div class="map-list" id="mapList">
          <!-- Map buttons will be generated here -->
        </div>
      </div>

      <div class="category-section" id="1v1-section">
        <h2>1V1 Match Timer</h2>
        <div class="onev1-panel">
          <!-- Dual Player Timer -->
          <div class="dual-timer-main">
            <!-- Player 1 -->
            <div class="player-section-main">
              <div class="player-name-main" id="player1NameMain">PLAYER 1</div>
              <div class="timer-display-main" id="player1TimerMain">0.00</div>
              <div class="timer-controls-main">
                <button class="timer-btn-main" id="player1StartMain" title="Start Player 1 timer">▶</button>
                <button class="timer-btn-main" id="player1StopMain" title="Stop Player 1 timer">⏹</button>
              </div>
            </div>

            <!-- Score Section -->
            <div class="score-section-main">
              <div class="score-display-main" id="scoreDisplayMain">0 — 0</div>
              <div class="score-accent-main"></div>
            </div>

            <!-- Player 2 -->
            <div class="player-section-main">
              <div class="player-name-main" id="player2NameMain">PLAYER 2</div>
              <div class="timer-display-main" id="player2TimerMain">0.00</div>
              <div class="timer-controls-main">
                <button class="timer-btn-main" id="player2StartMain" title="Start Player 2 timer">▶</button>
                <button class="timer-btn-main" id="player2StopMain" title="Stop Player 2 timer">⏹</button>
              </div>
            </div>
          </div>
          
          <!-- Color and Style Control -->
          <div class="style-selector">
            <div class="style-label">Timer Color</div>
            <div class="color-selector">
              <button class="color-btn neon-green active" data-color="#00ff88" data-name="green" title="Neon Green"></button>
              <button class="color-btn neon-cyan" data-color="#00ffff" data-name="cyan" title="Neon Cyan"></button>
              <button class="color-btn neon-purple" data-color="#ff00ff" data-name="purple" title="Neon Purple"></button>
              <button class="color-btn neon-pink" data-color="#ff0080" data-name="pink" title="Neon Pink"></button>
              <button class="color-btn neon-yellow" data-color="#ffff00" data-name="yellow" title="Neon Yellow"></button>
              <button class="color-btn neon-orange" data-color="#ff8000" data-name="orange" title="Neon Orange"></button>
              <button class="color-btn neon-white" data-color="#ffffff" data-name="white" title="White"></button>
            </div>
          </div>
          
          <!-- Control Buttons -->
          <div class="timer-controls">
            <button id="timerPopoutBtn" class="timer-btn" style="flex: 1; padding: 10px;">📍 Pop Out Timer</button>
            <button id="resetScoreBtnMain" class="timer-btn" style="flex: 1; padding: 10px;">↻ Reset Scores</button>
          </div>

          <!-- Hotkey Info -->
          <div class="hotkey-info">
            <small style="color: #888; margin-top: 10px; display: block;">Hotkeys: ← → Arrow to switch | Space to toggle</small>
          </div>
        </div>
      </div>

      <div class="category-section" id="settings-section">
        <h2>Hotkey Settings</h2>
        <div class="settings-panel">
          <div class="setting-item">
            <label>Start/Stop Timer:</label>
            <div class="hotkey-input-group">
              <input type="text" class="hotkey-input" id="hotkeyStartStop" readonly placeholder="Press a key...">
              <button class="reset-hotkey-btn" data-hotkey="startStop">Reset</button>
            </div>
          </div>
          <div class="setting-item">
            <label>Reset Timer:</label>
            <div class="hotkey-input-group">
              <input type="text" class="hotkey-input" id="hotkeyReset" readonly placeholder="Press a key...">
              <button class="reset-hotkey-btn" data-hotkey="reset">Reset</button>
            </div>
          </div>
          <div class="setting-item">
            <label>Timer Options:</label>
            <div class="toggle-option">
              <input type="checkbox" id="timertAlwaysOnTop" class="toggle-input">
              <label for="timertAlwaysOnTop" class="toggle-label">Timer Always On Top</label>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <div class="main-area">
      <div class="preview-area">
        <p id="nothingSelected" class="placeholder">Select a map to display its clock image</p>
        <img id="previewImage" class="preview-image" draggable="true">
        <button id="popoutBtn" class="popout-btn" style="display: none;">📍 Pop Out</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
